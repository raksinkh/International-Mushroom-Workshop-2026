<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f7;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            color: #333;
        }

        .form-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 71, 70, 0.08);
            max-width: 800px;
            margin: auto;
            border-top: 6px solid #004746;
        }

        h2 {
            color: #004746;
            font-weight: 700;
        }

        .text-muted {
            color: #6b7a7a !important;
        }

        .form-label {
            font-weight: 600;
            color: #004746;
            font-size: 0.95rem;
        }

        .form-control,
        .form-select {
            background-color: #f8fafa;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }

        .input-error {
            border-color: #e63946 !important;
            box-shadow: 0 0 0 0.25rem rgba(230, 57, 70, 0.25) !important;
            background-color: #fff5f5 !important;
        }

        .form-check-input.input-error {
            background-color: transparent !important;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #007573;
            box-shadow: 0 0 0 0.25rem rgba(0, 117, 115, 0.25);
        }

        .hidden-field {
            display: none;
        }

        .btn-submit {
            background-color: #007573;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            transition: background-color 0.3s ease, transform 0.1s, box-shadow 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0, 117, 115, 0.2);
        }

        .btn-submit:hover {
            background-color: #004746;
            color: white;
            box-shadow: 0 6px 12px rgba(0, 71, 70, 0.3);
        }

        .spinner-border {
            display: none;
        }

        /* Edit Specific */
        #loginSection {
            max-width: 500px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LOGIN SECTION -->
        <div id="loginSection" class="form-container">
            <h2 class="mb-3">Edit Registration</h2>
            <p class="text-muted mb-4">Please log in using your email address and the 8-character Secret Edit Code sent
                to your inbox.</p>

            <div id="loginAlertMsg" class="alert d-none" role="alert"></div>

            <form id="loginForm" onsubmit="handleLoginSubmit(event)">
                <div class="mb-3 text-start">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="loginEmail" id="loginEmail" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label">Secret Edit Code</label>
                    <input type="text" class="form-control" name="loginCode" id="loginCode"
                        style="font-family: monospace; letter-spacing: 2px;" placeholder="e.g. A1B2C3D4" required>
                </div>
                <button type="submit" class="btn btn-submit" id="loginBtn">
                    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"
                        id="loginSpinner"></span>
                    Secure Login
                </button>
            </form>
        </div>

        <!-- EDIT FORM SECTION -->
        <div id="editSection" class="form-container" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Update Details</h2>
                <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()">Logout</button>
            </div>

            <div id="editAlertMsg" class="alert alert-info" role="alert">
                Make your changes below and click <strong>Save Updates</strong>. Your Email Address is locked.
            </div>

            <form id="editForm" onsubmit="handleUpdateSubmit(event)">
                <input type="hidden" name="action" value="update">
                <input type="hidden" name="secretCode" id="hiddenSecretCode">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name (First Name, Family Name) *</label>
                        <input type="text" class="form-control" name="fullName" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email Address (Locked)</label>
                        <input type="email" class="form-control" name="email" id="editFormEmail"
                            style="background-color: #e9ecef; cursor: not-allowed;" readonly required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label d-block text-uppercase"
                        style="color: #007573; font-size: 1.1rem; border-bottom: 2px solid #007573; padding-bottom: 5px; margin-bottom: 15px;">Programme
                        Selection</label>
                    <label class="form-label d-block text-danger mb-3"><small><i class="bi bi-info-circle"></i>
                            Programme selection cannot be changed after registration.</small></label>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="programme" id="editProg1"
                            value="Integrating the Healthy Foods Value Chain: From Local to Functional Claim" disabled>
                        <label class="form-check-label text-muted" for="editProg1">"Integrating the Healthy Foods Value
                            Chain: From Local to Functional Claim"</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="programme" id="editProg2"
                            value="Smart Roots for ASEAN Future: From Traditional Wisdom to Innovative Agri-Preneur"
                            disabled>
                        <label class="form-check-label text-muted" for="editProg2">"Smart Roots for ASEAN Future: From
                            Traditional Wisdom to Innovative Agri-Preneur"</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="programme" id="editProg3"
                            value="Traditional Medicine Development Programme: Herbal Processing, Extraction, and GMP/PIC/S-Compliant Product Manufacturing"
                            disabled>
                        <label class="form-check-label text-muted" for="editProg3">"Traditional Medicine Development
                            Programme: Herbal Processing, Extraction, and GMP/PIC/S-Compliant Product
                            Manufacturing"</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="programme" id="editProg4"
                            value="Mushrooms from Wild to Table" disabled>
                        <label class="form-check-label text-muted" for="editProg4">"Mushrooms from Wild to
                            Table"</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="programme" id="editProg5"
                            value="Herbal Bioactive Analysis and Applied Product Innovation Programme" disabled>
                        <label class="form-check-label text-muted" for="editProg5">"Herbal Bioactive Analysis and
                            Applied Product Innovation Programme"</label>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="programme" id="editProg6"

                        <label class="form-check-label text-muted" for="editProg6">"Hands-On Mastery in

                <label class="form-label d-block text-uppercase mt-4"

                    Information</label>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender *</label>
                        <select class="form-select" name="gender" required>
                            <option value="" disabled>Select Gender</option>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nationality *</label>
                        <input type="text" class="form-control" name="nationality" required>

                </div>

                <div class="mb-4">
                    <label class="form-label d-block text-uppercase mt-4"
                        style="color: #007573; font-size: 1.1rem; border-bottom: 2px solid #007573; padding-bottom: 5px; margin-bottom: 15px;">Education

                    <div class="row">
                        <div class="col-md-6 mb-3">

                            <input type="text" class="form-control" name="eduBachelor" placeholder="e.g. B.Sc. Biology">

                        <div class="col-md-6 mb-3">

                        <div class="col-md-6 mb-3">

                <label class="form-label d-block text-uppercase mt-4"
                    style="color: #007573; font-size: 1.1rem; border-bottom: 2px solid #007573; padding-bottom: 5px; margin-bottom: 15px;">Professional
                    Information</label>

                <div class="mb-3">
                    <label class="form-label">Institution / Organization *</label>
                    <input type="text" class="form-control" name="institution" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">

                        <input type="text" class="form-control" name="position" required>

                    <div class="col-md-6 mb-3">

                        <div class="form-check mb-2">

                        </div>
                        <div class="form-check mb-2">

                                value="Faculty">
                            <label class="form-check-label" for="occFaculty">Faculty</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="occupation" id="occResearcher"
                                value="Researcher">
                            <label class="form-check-label" for="occResearcher">Researcher</label>
                        </div>

                        <div class="form-check d-flex align-items-end mb-2">

                                value="Other">
                            <label class="form-check-label text-nowrap me-2" for="occOther">Other:</label>
                            <input type="text"

                                onclick="document.getElementById('occOther').checked = true;">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number (with country code) *</label>
                    <input type="tel" class="form-control" name="phone" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Work Address *</label>
                    <textarea class="form-control" name="workAddress" rows="2" required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label d-block text-uppercase mt-4"
                        style="color: #007573; font-size: 1.1rem; border-bottom: 2px solid #007573; padding-bottom: 5px; margin-bottom: 15px;">Travel
                        & Visa Information</label>

                    <div class="mb-3">
                        <label class="form-label">Arrival Date in Chiang Rai, Thailand (DD/MM/YYYY) *</label>
                        <input type="date" class="form-control" name="arrivalDate" required>
                    </div>

                    <div class="mb-3 p-3"
                        style="background-color: #f8fafa; border-radius: 8px; border: 1px dashed #ced4da;">
                        <label class="form-label" style="color: #004746;">Arrival Flight Details:</label>
                        <div class="row">
                            <div class="col-md-4 mb-2"><input type="text" class="form-control form-control-sm"
                                    name="arrivalFlightNum" placeholder="Flight Number"></div>
                            <div class="col-md-4 mb-2"><input type="text" class="form-control form-control-sm"
                                    name="arrivalFlightFrom" placeholder="From"></div>
                            <div class="col-md-4 mb-2"><input type="text" class="form-control form-control-sm"
                                    name="arrivalFlightTo" placeholder="To"></div>
                        </div>

                        <label class="form-label mt-2" style="color: #004746;">Departure Flight Details:</label>
                        <div class="row">
                            <div class="col-md-4 mb-2"><input type="text" class="form-control form-control-sm"
                                    name="departureFlightNum" placeholder="Flight Number"></div>
                            <div class="col-md-4 mb-2"><input type="text" class="form-control form-control-sm"
                                    name="departureFlightFrom" placeholder="From"></div>
                            <div class="col-md-4 mb-2"><input type="text" class="form-control form-control-sm"
                                    name="departureFlightTo" placeholder="To"></div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Do you require an invitation letter for Visa application?
                        *</label>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="visaRequired" id="visaYes" value="Yes"
                            onchange="toggleVisaField()" required>
                        <label class="form-check-label" for="visaYes">Yes</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="visaRequired" id="visaNo" value="No"
                            onchange="toggleVisaField()">
                        <label class="form-check-label" for="visaNo">No</label>
                    </div>
                </div>

                <div class="mb-3 hidden-field" id="visaDetailsContainer">
                    <div class="mb-3">
                        <label class="form-label">Passport Copy</label>
                        <div id="passportLinkContainer" class="mb-2"></div>
                        <input type="file" class="form-control" id="passportFile" name="passportFile"
                            accept="image/*,.pdf">
                        <small class="text-muted">Upload a new file only if you wish to update the current copy.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Name of the Royal Thai Embassy/Consulate-General where you will apply
                            for a visa: *</label>
                        <input type="text" class="form-control" id="embassyName" name="embassyName"
                            placeholder="e.g. Embassy in Beijing">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label d-block">Accommodation? (Pay by yourself) *</label>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="accommodation" id="accHelp"
                                value="Wanawes – the on-campus hostel is recommended. The room rate with breakfast is 850 THB per room per night. Reservation: wanawes@mfu.ac.th Tel: +66 53 917899"
                                required>
                            <label class="form-check-label" for="accHelp" style="line-height:1.4;">
                                Wanawes – the on-campus hostel is recommended.<br>
                                <span class="text-muted" style="font-size:0.9em;">The room rate with breakfast is 850
                                    THB per room per night.</span><br>
                                <span class="text-muted" style="font-size:0.9em;">Reservation:
                                    wanawes@mfu.ac.th</span><br>
                                <span class="text-muted" style="font-size:0.9em;">Tel: +66 53 917899</span>
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="accommodation" id="accSelf"
                                value="Booking by yourself">
                            <label class="form-check-label" for="accSelf">Booking by yourself</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label d-block">Food Preference? *</label>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="foodPreference" id="foodNone"
                                value="No restriction" required>
                            <label class="form-check-label" for="foodNone">No restriction</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="foodPreference" id="foodVeg"
                                value="Vegetarian">
                            <label class="form-check-label" for="foodVeg">Vegetarian</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="foodPreference" id="foodVegan"
                                value="Vegan">
                            <label class="form-check-label" for="foodVegan">Vegan</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="foodPreference" id="foodHalal"
                                value="Halal">
                            <label class="form-check-label" for="foodHalal">Halal</label>
                        </div>
                        <div class="form-check d-flex align-items-end mb-2">
                            <input class="form-check-input me-2 mb-1" type="radio" name="foodPreference" id="foodOther"
                                value="Other">
                            <label class="form-check-label text-nowrap me-2" for="foodOther">Other:</label>
                            <input type="text"
                                class="form-control border-0 border-bottom rounded-0 shadow-none px-1 py-0 mb-1"
                                style="background-color: transparent; flex-grow: 1;" name="foodPreferenceOther"
                                onclick="document.getElementById('foodOther').checked = true;">
                        </div>
                    </div>
                </div>

                <div class="mb-4 p-3"
                    style="background-color: #fffafa; border-left: 4px solid #e63946; border-radius: 4px;">
                    <label class="form-label text-uppercase mb-2" style="color: #e63946;">Emergency Contact *</label>
                    <div class="row">
                        <div class="col-md-4 mb-2">
                            <input type="text" class="form-control" name="emgName" placeholder="Name" required>
                        </div>
                        <div class="col-md-4 mb-2">
                            <input type="text" class="form-control" name="emgRelationship" placeholder="Relationship"
                                required>
                        </div>
                        <div class="col-md-4 mb-2">
                            <input type="tel" class="form-control" name="emgPhone" placeholder="Phone Number" required>
                        </div>
                    </div>
                </div>

                <div class="mb-4 d-none">
                    <!-- Kept hidden to comply with underlying form structure, inherently Yes if updating -->
                    <input type="checkbox" name="confirm" value="Yes" checked>
                    <input type="checkbox" name="consentData" value="Yes" checked>
                </div>

                <button type="submit" class="btn btn-submit" id="updateBtn">
                    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"
                        id="updateSpinner"></span>
                    Save Updates
                </button>
            </form>
        </div>
    </div>

    <script>
        // LATEST PRODUCTION SCRIPT URL (BRAND NEW PROJECT)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHNaO-yEQMsytR-i0okoUfnzsDVQSeco6Aqe5oh838P_1ISaak_yFsKZbQv66RtXQG/exec";
        

    // Toggle Visa Address field
    function toggleVisaField() {
    var visaYes = document.getElementById("visaYes");
    var detailsContainer = document.getElementById("visaDetailsContainer");
    var passportInput = document.getElementById("passportFile");
    var embassyInput = document.getElementById("embassyName");

    if (visaYes && visaYes.checked) {
    detailsContainer.classList.remove("hidden-field");
    // In Edit mode, passport is optional if already uploaded
    embassyInput.setAttribute("required", "required");
    } else {
    detailsContainer.classList.add("hidden-field");
    passportInput.removeAttribute("required");
    embassyInput.removeAttribute("required");
    passportInput.value = "";
    embassyInput.value = "";
    }
    }

    // Helper to read file as Base64
    function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
    });
    }

    // Setup validation highlighting for edit form
    document.addEventListener('DOMContentLoaded', function () {
    // Check for magic link auto-login URL parameters
    var params = new URLSearchParams(window.location.search);
    var urlEmail = params.get('email');
    var urlCode = params.get('code');

    if (urlEmail && urlCode) {
    document.getElementById('loginEmail').value = urlEmail;
    document.getElementById('loginCode').value = urlCode;
    document.getElementById('loginBtn').click(); // Auto-trigger login sequence
    }

            var inputs = document.querySelectorAll('#editForm .form-control, #editForm .form-select, #editForm .form-check-input');
    inputs.forEach(function (input) {
    input.addEventListener('invalid', function (e) {
    e.target.classList.add('input-error');
    });
    input.addEventListener('input', function (e) {
    if (e.target.validity.valid) {
    e.target.classList.remove('input-error');
    if (e.target.type === 'radio') {
    var siblings = document.querySelectorAll('input[name="' + e.target.name + '"]');
    siblings.forEach(function (r) { r.classList.remove('input-error'); });
    }
    }
    });
    input.addEventListener('change', function (e) {
    if (e.target.validity.valid) {
    e.target.classList.remove('input-error');
    if (e.target.type === 'radio') {
    var siblings = document.querySelectorAll('input[name="' + e.target.name + '"]');
    siblings.forEach(function (r) { r.classList.remove('input-error'); });
    }
    }
    });
    });
    });

    // Step 1: Login & Fetch Data
    function handleLoginSubmit(event) {
    event.preventDefault();
    var email = document.getElementById('loginEmail').value.trim();
    var code = document.getElementById('loginCode').value.trim();
    var loginBtn = document.getElementById('loginBtn');
    var loginSpinner = document.getElementById('loginSpinner');
    var alertMsg = document.getElementById('loginAlertMsg');

    loginBtn.disabled = true;
    loginSpinner.style.display = 'inline-block';
    alertMsg.classList.add('d-none');

    var payload = new URLSearchParams();
    payload.append('action', 'fetch');
    payload.append('email', email);
    payload.append('secretCode', code);

    fetch(SCRIPT_URL, {
    method: "POST",
    body: payload
    })
    .then(response => response.json())
    .then(res => {
    loginBtn.disabled = false;
    loginSpinner.style.display = 'none';

    if (res.status === "Success") {
    populateForm(res.data, code);
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('editSection').style.display = 'block';
    window.scrollTo(0, 0);
    } else {
    throw new Error(res.message);
    }
    })
    .catch(error => {
    loginBtn.disabled = false;
    loginSpinner.style.display = 'none';
    alertMsg.className = "alert alert-danger";
    alertMsg.textContent = "Error: " + error.message;
    alertMsg.classList.remove('d-none');
    });
    }

    // Helper to populate fields gracefully
    function populateForm(data, secretCode) {
    var form = document.getElementById('editForm');

    // Set Hidden Identifiers
    document.getElementById('editFormEmail').value = data['Email'] || '';
    document.getElementById('hiddenSecretCode').value = secretCode;

    // Standard Inputs
    form.elements['fullName'].value = data['Full Name'] || '';
    form.elements['nationality'].value = data['Nationality'] || '';
    form.elements['institution'].value = data['Institution / Organization'] || '';
    form.elements['position'].value = data['Position / Title'] || '';
    form.elements['phone'].value = data['Phone'] || '';
    form.elements['workAddress'].value = data['Work Address'] || '';
            form.elements['arrivalDate'].value = (data['Arrival Date in Chiang Rai'] || '').split('T')[0]; // Format Date if needed

    form.elements['eduBachelor'].value = data['Education - Bachelor'] || '';
    form.elements['eduMaster'].value = data['Education - Master'] || '';
    form.elements['eduDoctoral'].value = data['Education - Doctoral'] || '';
    form.elements['eduOther'].value = data['Education - Other'] || '';

    form.elements['arrivalFlightNum'].value = data['Arrival Flight Number'] || '';
    form.elements['arrivalFlightFrom'].value = data['Arrival Flight From'] || '';
    form.elements['arrivalFlightTo'].value = data['Arrival Flight To'] || '';

    form.elements['departureFlightNum'].value = data['Departure Flight Number'] || '';
    form.elements['departureFlightFrom'].value = data['Departure Flight From'] || '';
    form.elements['departureFlightTo'].value = data['Departure Flight To'] || '';

    form.elements['emgName'].value = data['Emergency Contact Name'] || '';
    form.elements['emgRelationship'].value = data['Emergency Contact Relationship'] || '';
    form.elements['emgPhone'].value = data['Emergency Contact Phone'] || '';

    // Selects
    if (data['Gender']) form.elements['gender'].value = data['Gender'];

    // Generic Radio Helper
    function setRadio(name, val, otherBoxId, otherInputName) {
    var match = document.querySelector(`input[name="${name}"][value="${val}"]`);
    if (match) {
    match.checked = true;
    } else if (val && val !== 'N/A') {
    document.getElementById(otherBoxId).checked = true;
    form.elements[otherInputName].value = val;
    }
    }

    setRadio('occupation', data['Current Occupation'], 'occOther', 'occupationOther');
    setRadio('foodPreference', data['Food Preference'], 'foodOther', 'foodPreferenceOther');

    var progMatch = document.querySelector(`input[name="programme"][value="${data['Programme']}"]`);
    if (progMatch) progMatch.checked = true;

    // Specific Radios
    var accMatch = document.querySelector(`input[name="accommodation"][value="${data['Accommodation']}"]`);
    if (accMatch) accMatch.checked = true;

    var visaMatch = document.querySelector(`input[name="visaRequired"][value="${data['Requires Visa Invitation']}"]`);
    if (visaMatch) visaMatch.checked = true;

    if (data['Requires Visa Invitation'] === "Yes") {
        form.elements['embassyName'].value = data['Embassy Name'] || '';
        var linkContainer = document.getElementById('passportLinkContainer');
        
        // [SECURITY UPDATE] Masking the real link.
        if (data['Passport Link'] === 'PROTECTED') {
            linkContainer.innerHTML = `<div class="alert alert-success py-2 mb-2" style="font-size: 0.9rem;">
                ✅ Current Passport Document is Securely Uploaded
            </div>`;
        } else if (data['Passport Link'] && data['Passport Link'] !== 'N/A') {
            linkContainer.innerHTML = `<a href="${data['Passport Link']}" target="_blank" class="btn btn-sm btn-outline-primary mb-2">View Current Passport Copy</a>`;
        } else {
            linkContainer.innerHTML = `<span class="text-danger small d-block mb-2">No passport uploaded yet.</span>`;
            document.getElementById('passportFile').setAttribute('required', 'required');
        }
    }
    toggleVisaField(); // Refresh UI State
    }

    // Step 2: Save Updates
    async function handleUpdateSubmit(event) {
    event.preventDefault();
    var form = document.getElementById('editForm');
    var updateBtn = document.getElementById('updateBtn');
    var updateSpinner = document.getElementById('updateSpinner');
    var alertMsg = document.getElementById('editAlertMsg');

    updateBtn.disabled = true;
    updateSpinner.style.display = 'inline-block';
    alertMsg.className = "alert alert-info";
    alertMsg.textContent = "Saving changes...";

    try {
    var formData = new FormData(form);
    var visaRequired = formData.get('visaRequired');

    if (visaRequired === 'Yes') {
        const fileInput = document.getElementById('passportFile');
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            
            // [UX UPDATE] 5MB File Size Limit Check
            if (file.size > 5 * 1024 * 1024) {
                throw new Error("File is too large (" + (file.size/1024/1024).toFixed(2) + "MB). Please upload a file smaller than 5MB.");
            }

            const base64Content = await readFileAsBase64(file);
            formData.append('passportFileContent', base64Content);
            formData.append('passportFileName', file.name);
        }
    }

    // Remove file object
    formData.delete('passportFile');

    var searchParams = new URLSearchParams(formData);

    const response = await fetch(SCRIPT_URL + '?t=' + new Date().getTime(), {
    method: "POST",
    body: searchParams
    });

    const data = await response.json();

    updateBtn.disabled = false;
    updateSpinner.style.display = 'none';

    if (data.status === "Success") {
    alertMsg.className = "alert alert-success";
    alertMsg.textContent = "Success! Your registration details have been updated.";
    window.scrollTo(0, 0);

    // Refresh data to show new link if uploaded
    if (data.newPassportLink) {
    document.getElementById('passportLinkContainer').innerHTML = `<a href="${data.newPassportLink}" target="_blank"
        class="btn btn-sm btn-outline-primary mb-2">View Current Passport Copy</a>`;
    }
    } else {
    throw new Error(data.message);
    }
    } catch (error) {
    updateBtn.disabled = false;
    updateSpinner.style.display = 'none';
    alertMsg.className = "alert alert-danger";
    alertMsg.textContent = "Error: " + error.message;
    }
    }
    </script>
