<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f7;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            color: #333;
        }

        .form-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 71, 70, 0.08);
            max-width: 800px;
            margin: auto;
            border-top: 6px solid #004746;
        }

        h2 {
            color: #004746;
            font-weight: 700;
        }

        .text-muted {
            color: #6b7a7a !important;
        }

        .form-label {
            font-weight: 600;
            color: #004746;
            font-size: 0.95rem;
        }

        .form-control,
        .form-select {
            background-color: #f8fafa;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }

        .input-error {
            border-color: #e63946 !important;
            box-shadow: 0 0 0 0.25rem rgba(230, 57, 70, 0.25) !important;
            background-color: #fff5f5 !important;
        }

        .form-check-input.input-error {
            background-color: transparent !important;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #007573;
            box-shadow: 0 0 0 0.25rem rgba(0, 117, 115, 0.25);
        }

        .hidden-field {
            display: none;
        }

        .btn-submit {
            background-color: #007573;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            transition: background-color 0.3s ease, transform 0.1s, box-shadow 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0, 117, 115, 0.2);
        }

        .btn-submit:hover {
            background-color: #004746;
            color: white;
            box-shadow: 0 6px 12px rgba(0, 71, 70, 0.3);
        }

        .btn-submit:active {
            transform: translateY(2px);
            box-shadow: 0 2px 4px rgba(0, 71, 70, 0.2);
        }

        .form-check-input:checked {
            background-color: #007573;
            border-color: #007573;
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 0.25rem rgba(0, 117, 115, 0.25);
            border-color: #007573;
        }

        .spinner-border {
            display: none;
        }

        .alert-success {
            background-color: #e6f2f2;
            border-color: #007573;
            color: #004746;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="form-container">
            <h2 class="mb-4 text-center">FMFC Global Training Programme v3</h2>
            <p class="text-muted text-center mb-4">Innovative Farmers, Traditional Medicine, Healthy Foods and
                Cosmetics.</p>

            <div id="alertMessage" class="alert d-none" role="alert"></div>

            <form id="registrationForm" onsubmit="handleFormSubmit(event)">

                    <div class="form-check mb-2">

                            Wisdom to Innovative Agri-Preneur" <br><small class="text-muted">Training Date: 12-16 July
                                2026</small></label>

                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="programme" id="prog3"
                            value="Traditional Medicine Development Programme: Herbal Processing, Extraction, and GMP/PIC/S-Compliant Product Manufacturing">
                        <label class="form-check-label" for="prog3">"Traditional Medicine Development Programme: Herbal

                    <div class="form-check mb-2">

                        <div class="row">
                            <div class="col-md-4 mb-2"><input type="text" class="form-control form-control-sm"

                    <div class="form-check mb-2">

                                <span class="text-muted" style="font-size:0.9em;">Reservation:

                                <span class="text-muted" style="font-size:0.9em;">Tel: +66 53 917899</span>

                    </div>

    <script>
        // LATEST PRODUCTION SCRIPT URL (BRAND NEW PROJECT)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHNaO-yEQMsytR-i0okoUfnzsDVQSeco6Aqe5oh838P_1ISaak_yFsKZbQv66RtXQG/exec";


        // Toggle the Visa Address field visibility
        function toggleVisaField() {
            var visaYes = document.getElementById("visaYes");
            var detailsContainer = document.getElementById("visaDetailsContainer");
            var passportInput = document.getElementById("passportFile");
            var embassyInput = document.getElementById("embassyName");

            if (visaYes && visaYes.checked) {
                detailsContainer.classList.remove("hidden-field");
                passportInput.setAttribute("required", "required");
                embassyInput.setAttribute("required", "required");
            } else {
                detailsContainer.classList.add("hidden-field");
                passportInput.removeAttribute("required");
                embassyInput.removeAttribute("required");
                passportInput.value = "";
                embassyInput.value = "";
            }
        }

        // Helper to read file as Base64
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // Handle Form Submission via fetch API
        async function handleFormSubmit(event) {
            event.preventDefault();

            var form = document.getElementById('registrationForm');
            var submitBtn = document.getElementById('submitBtn');
            var spinner = document.querySelector('.spinner-border');
            var alertMsg = document.getElementById('alertMessage');

            if (SCRIPT_URL === "YOUR_WEB_APP_URL_HERE") {
                alert("Please replace 'YOUR_WEB_APP_URL_HERE' with your actual Google Apps Script Web App URL in the HTML code.");
                return;
            }

            // UI Loading state
            submitBtn.disabled = true;
            spinner.style.display = 'inline-block';
            alertMsg.classList.add('d-none');

            try {
                var formData = new FormData(form);
                var visaRequired = formData.get('visaRequired');

                // If visa is required, handle the file upload
                if (visaRequired === 'Yes') {
                    const fileInput = document.getElementById('passportFile');
                    if (fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        
                        // [UX UPDATE] 5MB File Size Limit Check
                        if (file.size > 5 * 1024 * 1024) {
                            throw new Error("File is too large (" + (file.size/1024/1024).toFixed(2) + "MB). Please upload a file smaller than 5MB.");
                        }

                        const base64Content = await readFileAsBase64(file);
                        formData.append('passportFileContent', base64Content);
                        formData.append('passportFileName', file.name);
                    }
                }

                formData.append('action', 'register');

                // Remove the actual file object from formData to avoid issues with URLSearchParams
                formData.delete('passportFile');

                var searchParams = new URLSearchParams(formData);

                // Added cache-busting to prevent browser from reusing old failed requests
                const response = await fetch(SCRIPT_URL + '?t=' + new Date().getTime(), {
                    method: "POST",
                    body: searchParams
                });

                const data = await response.json();

                if (data.status === "Success") {
                    // Dynamically inject the confirmation page into the current view
                    document.querySelector('.container').innerHTML = `
    <div class="form-container" style="max-width: 600px; text-align: center; padding: 60px 40px; margin: auto;">
        <div
            style="width: 80px; height: 80px; border-radius: 50%; background-color: #e6f2f2; color: #007573; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-check-lg"
                viewBox="0 0 16 16">
                <path
                    d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z" />
            </svg>
        </div>
        <h2 style="color: #004746; font-weight: 700; margin-bottom: 20px;">Registration Successful</h2>
        <p style="color: #6b7a7a; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px;">Thank you for registering
            for the upcoming workshop in Chiang Rai. We have safely received your details and will be in touch soon.</p>
    </div>
    `;
                    window.scrollTo(0, 0);
                } else {
                    throw new Error(data.message || "Unknown error occurred");
                }
            } catch (error) {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                alertMsg.className = "alert alert-danger";
                alertMsg.textContent = "Error: " + error.message;
                alertMsg.classList.remove('d-none');
            }
        }

        // Setup clear visual validation highlighting
        document.addEventListener('DOMContentLoaded', function () {
            var inputs = document.querySelectorAll('.form-control, .form-select, .form-check-input');

            inputs.forEach(function (input) {
                // When browser detects a missing required field upon submit
                input.addEventListener('invalid', function (e) {
                    e.target.classList.add('input-error');
                });

                // When user corrects the field
                input.addEventListener('input', function (e) {
                    if (e.target.validity.valid) {
                        e.target.classList.remove('input-error');
                        // If it's a radio button, clear the error from all siblings in the same group
                        if (e.target.type === 'radio') {
                            var siblings = document.querySelectorAll('input[name="' + e.target.name + '"]');
                            siblings.forEach(function (radio) {
                                radio.classList.remove('input-error');
                            });
                        }
                    }
                });

                input.addEventListener('change', function (e) {
                    if (e.target.validity.valid) {
                        e.target.classList.remove('input-error');
                        if (e.target.type === 'radio') {
                            var siblings = document.querySelectorAll('input[name="' + e.target.name + '"]');
                            siblings.forEach(function (radio) {
                                radio.classList.remove('input-error');
                            });
                        }
                    }
                });
            });
        });
    </script>
